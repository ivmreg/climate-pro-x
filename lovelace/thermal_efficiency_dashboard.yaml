# Thermal Efficiency dashboard.
#
# Install: Settings -> Dashboards -> Add dashboard -> "New dashboard from
# scratch" -> open it -> pencil icon -> three-dot menu -> "Raw configuration
# editor" -> paste this whole file.
#
# Install the companion card first:
#   1. Copy lovelace/thermal-storyboard-card.js to
#      /config/www/thermal-storyboard-card.js.
#   2. Settings -> Dashboards -> three-dot menu -> Resources -> Add resource:
#        URL: /local/thermal-storyboard-card.js
#        Type: JavaScript module
#
# No third-party Lovelace cards are required. Entity ids below match this
# instance; a fresh install may name the newer sensors without the
# "metahome_" device prefix, so adjust those ids if needed.

views:
  - title: Thermal efficiency
    icon: mdi:home-thermometer
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: custom:thermal-storyboard-card
            title: Thermal efficiency
            hlc: sensor.thermal_efficiency_heat_loss_coefficient
            fabric: sensor.metahome_thermal_efficiency_fabric_heat_loss
            ventilation: sensor.metahome_thermal_efficiency_ventilation_heat_loss
            ach: sensor.metahome_thermal_efficiency_air_change_rate
            hot_water: sensor.metahome_thermal_efficiency_hot_water_gas
            loft: sensor.thermal_efficiency_loft_ratio
            rooms:
              - sensor.thermal_efficiency_living_room_time_constant
              - sensor.thermal_efficiency_bedroom_time_constant
              - sensor.thermal_efficiency_kids_room_time_constant
              - sensor.thermal_efficiency_kitchen_time_constant
              - sensor.thermal_efficiency_bathroom_time_constant
              - sensor.thermal_efficiency_office_time_constant
