views:
  - title: Thermal efficiency
    icon: mdi:home-thermometer
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: gauge
            entity: sensor.thermal_efficiency_heat_loss_coefficient
            name: Delivered heat loss
            min: 0
            max: 500
            needle: true
            grid_options:
              columns: 4
              rows: 4
            segments:
              - from: 0
                color: "#2e7d32"
              - from: 100
                color: "#7cb342"
              - from: 180
                color: "#f9a825"
              - from: 280
                color: "#ef6c00"
              - from: 400
                color: "#c62828"
          - type: gauge
            entity: sensor.metahome_thermal_efficiency_air_change_rate
            name: Air changes per hour
            min: 0
            max: 1.5
            needle: true
            grid_options:
              columns: 4
              rows: 4
            segments:
              - from: 0
                color: "#ef6c00"
              - from: 0.35
                color: "#2e7d32"
              - from: 0.7
                color: "#f9a825"
              - from: 1
                color: "#c62828"
          - type: gauge
            entity: sensor.metahome_thermal_efficiency_electricity_baseload
            name: Always-on electricity
            min: 0
            max: 400
            needle: true
            grid_options:
              columns: 4
              rows: 4
            segments:
              - from: 0
                color: "#2e7d32"
              - from: 120
                color: "#7cb342"
              - from: 200
                color: "#f9a825"
              - from: 300
                color: "#c62828"
      - type: grid
        cards:
          - type: custom:plotly-graph
            title: Room thermal fingerprints · effective τ
            raw_plotly_config: true
            refresh_interval: auto
            entities:
              - entity: sensor.thermal_efficiency_living_room_time_constant
                type: bar
                orientation: h
                x: |-
                  $ex {
                    vars.roomRows = [
                      ['Office', 'sensor.thermal_efficiency_office_time_constant'],
                      ['Living room', 'sensor.thermal_efficiency_living_room_time_constant'],
                      ['Bedroom', 'sensor.thermal_efficiency_bedroom_time_constant'],
                      ['Kids room', 'sensor.thermal_efficiency_kids_room_time_constant'],
                      ['Bathroom', 'sensor.thermal_efficiency_bathroom_time_constant'],
                      ['Kitchen', 'sensor.thermal_efficiency_kitchen_time_constant']
                    ].map(([name, id]) => ({
                      name,
                      value: Number(hass.states[id]?.state),
                      nights: Number(hass.states[id]?.attributes?.nights_fitted) || 0
                    })).filter(room => Number.isFinite(room.value))
                       .sort((a, b) => b.value - a.value);
                    return vars.roomRows.map(room => room.value);
                  }
                "y": $ex vars.roomRows.map(room => room.name)
                customdata: $ex vars.roomRows.map(room => room.nights)
                marker:
                  color: |-
                    $ex vars.roomRows.map((room, index) =>
                      ['#2e7d32', '#7cb342', '#f9a825', '#ef6c00', '#d84315', '#c62828'][index]
                    )
                texttemplate: "%{x:.1f} h"
                textposition: auto
                hovertemplate: >-
                  %{y}<br>τ %{x:.1f} h<br>%{customdata} fitted
                  nights<extra></extra>
            layout:
              height: 365
              margin:
                l: 105
                r: 24
                t: 35
                b: 70
              bargap: 0.25
              xaxis:
                title: Effective cooling time constant τ (hours)
                rangemode: tozero
                gridcolor: rgba(127,127,127,0.16)
              yaxis:
                automargin: true
              font:
                color: $ex css_vars['primary-text-color']
              paper_bgcolor: rgba(0,0,0,0)
              plot_bgcolor: rgba(0,0,0,0)
            config:
              displayModeBar: false
              responsive: true
      - type: grid
        column_span: 1
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Delivered HLC and loss split · 12 months
              show_states: true
              colorize_states: true
            graph_span: 365d
            span:
              end: day
            apex_config:
              chart:
                height: 255
              stroke:
                curve: smooth
                dashArray:
                  - 0
                  - 0
                  - 5
              legend:
                position: top
              yaxis:
                min: 0
                decimalsInFloat: 0
                title:
                  text: W/K
            series:
              - entity: sensor.thermal_efficiency_heat_loss_coefficient
                name: Total HLC
                color: "#7e57c2"
                type: area
                stroke_width: 3
                opacity: 0.1
                group_by:
                  duration: 7d
                  func: avg
              - entity: sensor.metahome_thermal_efficiency_fabric_heat_loss
                name: Fabric
                color: "#ef5350"
                type: line
                stroke_width: 2
                group_by:
                  duration: 7d
                  func: avg
              - entity: sensor.metahome_thermal_efficiency_ventilation_heat_loss
                name: Ventilation
                color: "#42a5f5"
                type: line
                stroke_width: 2
                group_by:
                  duration: 7d
                  func: avg
      - type: grid
        cards:
          - type: heading
            heading: Gas use
            icon: mdi:meter-gas
          - type: tile
            grid_options:
              columns: 6
              rows: 2
            entity: sensor.metahome_thermal_efficiency_hot_water_gas_7_day_average
            name: Hot water · 7-day average
            icon: mdi:shower-head
            color: blue
            vertical: true
            features_position: bottom
          - type: tile
            grid_options:
              columns: 6
              rows: 2
            entity: sensor.metahome_thermal_efficiency_space_heating_gas_7_day_average
            name: Space heating · 7-day average
            icon: mdi:radiator
            color: deep-orange
            show_entity_picture: false
            hide_state: false
            vertical: true
            features_position: bottom
          - type: custom:apexcharts-card
            header:
              show: true
              title: Attributed gas · 90 days
            graph_span: 90d
            span:
              end: day
            apex_config:
              chart:
                height: 255
              stroke:
                curve: smooth
              legend:
                position: top
              yaxis:
                min: 0
                decimalsInFloat: 1
                title:
                  text: kWh/day
            series:
              - entity: sensor.metahome_thermal_efficiency_hot_water_gas_7_day_average
                name: Hot water
                color: "#42a5f5"
                type: area
                stroke_width: 2
                opacity: 0.18
                group_by:
                  duration: 1d
                  func: avg
              - entity: >-
                  sensor.metahome_thermal_efficiency_space_heating_gas_7_day_average
                name: Space heating
                color: "#ef6c00"
                type: area
                stroke_width: 2
                opacity: 0.14
                group_by:
                  duration: 1d
                  func: avg
      - type: grid
        cards:
          - type: heading
            heading: Electricity
            icon: mdi:transmission-tower-import
          - type: tile
            grid_options:
              columns: 6
              rows: 2
            entity: sensor.metahome_thermal_efficiency_electricity_use_7_day_average
            name: Use · 7-day average
            icon: mdi:flash
            color: amber
            vertical: true
            features_position: bottom
          - type: custom:apexcharts-card
            header:
              show: true
              title: Electricity use · 90 days
            graph_span: 90d
            span:
              end: day
            apex_config:
              chart:
                height: 255
              stroke:
                curve: smooth
              yaxis:
                min: 0
                decimalsInFloat: 1
                title:
                  text: kWh/day
            series:
              - entity: >-
                  sensor.metahome_thermal_efficiency_electricity_use_7_day_average
                name: Electricity
                color: "#f9a825"
                type: area
                stroke_width: 2
                opacity: 0.2
                group_by:
                  duration: 1d
                  func: avg
      - type: grid
        cards:
          - type: heading
            heading: Water
            icon: mdi:water
          - type: tile
            entity: sensor.metahome_thermal_efficiency_total_water_use_7_day_average
            name: Total water · latest 7 reported days
            icon: mdi:water-outline
            color: cyan
            vertical: true
            features_position: bottom
          - type: custom:apexcharts-card
            header:
              show: true
              title: Total water · 90 days
            graph_span: 90d
            span:
              end: day
            apex_config:
              chart:
                height: 255
              stroke:
                curve: smooth
              yaxis:
                min: 0
                decimalsInFloat: 0
                title:
                  text: L/day
            series:
              - entity: >-
                  sensor.metahome_thermal_efficiency_total_water_use_7_day_average
                name: Total water
                color: "#26c6da"
                type: area
                stroke_width: 2
                opacity: 0.18
                group_by:
                  duration: 1d
                  func: avg
