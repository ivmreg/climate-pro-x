name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        # Current Home Assistant development/test dependencies target 3.13.
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest
      - name: Enforce live core branch coverage
        run: >-
          python -m coverage report
          --include='custom_components/thermal_efficiency/thermal_math.py'
          --fail-under=90
